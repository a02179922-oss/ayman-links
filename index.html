<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayman Roshdy - My Links</title>
    <!-- استيراد الأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body { 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: #e9e9e9; 
        }

        /* إطار الموبايل */
        .phone { 
            width: 320px; 
            height: 600px; 
            background: #000; 
            border-radius: 40px; 
            padding: 30px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.4); 
        }

        /* حاوية الصورة */
        .profile { 
            width: 110px; 
            height: 110px; 
            border-radius: 50%; 
            overflow: hidden; 
            margin-top: 20px; 
            border: 3px solid #fff; 
            background: #222; 
        }

        .profile img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block; 
        }

        /* الاسم */
        h1 { 
            color: #fff; 
            font-size: 20px; 
            margin-top: 15px; 
            letter-spacing: 0.5px; 
        }

        /* أيقونات الزينة */
        .top-icons { 
            margin-top: 10px; 
            display: flex; 
            gap: 20px; 
            opacity: 0.6; 
        }

        .top-icons i { 
            color: white; 
            font-size: 20px; 
        }

        /* حاوية الروابط */
        .links { 
            width: 100%; 
            margin-top: 25px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }

        .link-button { 
            background: #1c1c1c; 
            color: white; 
            padding: 14px; 
            border-radius: 12px; 
            text-align: center; 
            text-decoration: none; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 10px; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
            border: 1px solid #333; 
        }

        .link-button:hover { 
            background: #fff; 
            color: #000; 
            transform: scale(1.03); 
        }
    </style>
</head>
<body>

<div class="phone">
    <!-- الصورة الشخصية -->
    <div class="profile">
        <img src="https://i.ibb.co/51Jd3mX/me.jpg" alt="Ayman Roshdy">
    </div>

    <!-- الاسم -->
    <h1>Ayman Roshdy</h1>

    <!-- أيقونات إضافية -->
    <div class="top-icons">
        <i class="fa-brands fa-instagram"></i>
        <i class="fa-brands fa-x-twitter"></i>
        <i class="fa-brands fa-tiktok"></i>
    </div>

    <!-- قائمة الروابط -->
    <div class="links">
        <a class="link-button" href="https://wa.me/201553560401" target="_blank">
            <i class="fa-brands fa-whatsapp"></i> WhatsApp
        </a>
        <a class="link-button" href="https://www.threads.net/@ayman__roshdy" target="_blank">
            <i class="fa-brands fa-threads"></i> Threads
        </a>
        <a class="link-button" href="https://www.instagram.com/ayman__roshdy" target="_blank">
            <i class="fa-brands fa-instagram"></i> Instagram
        </a>
        <a class="link-button" href="https://x.com/Ayman__Roshdy" target="_blank">
            <i class="fa-brands fa-x-twitter"></i> X (Twitter)
        </a>
        <a class="link-button" href="https://www.tiktok.com/@ayman__roshdy" target="_blank">
            <i class="fa-brands fa-tiktok"></i> TikTok
        </a>
    </div>
</div>

</body>
</html>
